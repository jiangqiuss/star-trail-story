<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>星轨物语：记忆碎片</title>
    <style>
        /* ==================== 基础样式 ==================== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #0a0e27;
            --secondary: #1a1f4e;
            --accent: #ffd700;
            --accent2: #ff6b9d;
            --text: #e0e0ff;
            --text-secondary: #8888aa;
            --card-bg: rgba(26, 31, 78, 0.9);
            --border: rgba(255, 215, 0, 0.3);
        }

        body {
            font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
            background: var(--primary);
            color: var(--text);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* ==================== 星空背景 (Canvas 优化) ==================== */
        #stars-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        /* ==================== 主容器 ==================== */
        .container {
            position: relative;
            z-index: 1;
            max-width: 500px;
            margin: 0 auto;
            min-height: 100vh;
            padding: 20px;
            padding-bottom: 80px;
        }

        /* ==================== 顶部导航 ==================== */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 20px;
            background: var(--card-bg);
            border-radius: 15px;
            margin-bottom: 20px;
            border: 1px solid var(--border);
            backdrop-filter: blur(10px);
        }

        .logo {
            font-size: 1.2em;
            font-weight: bold;
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .resources {
            display: flex;
            gap: 15px;
        }

        .resource {
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: 0.9em;
        }

        .resource-icon {
            width: 20px;
            height: 20px;
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
        }

        /* ==================== 页面内容 ==================== */
        .page {
            display: none;
            animation: fadeIn 0.3s ease;
        }

        .page.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* ==================== 底部导航 ==================== */
        .nav {
            position: fixed;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 100%;
            max-width: 500px;
            display: flex;
            justify-content: space-around;
            padding: 15px 20px;
            background: var(--card-bg);
            border-top: 1px solid var(--border);
            backdrop-filter: blur(10px);
            z-index: 100;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
            cursor: pointer;
            padding: 10px 15px;
            border-radius: 10px;
            transition: all 0.3s;
            color: var(--text-secondary);
        }

        .nav-item.active {
            color: var(--accent);
            background: rgba(255, 215, 0, 0.1);
        }

        .nav-item:hover {
            color: var(--accent);
        }

        .nav-icon {
            font-size: 1.5em;
        }

        .nav-text {
            font-size: 0.7em;
        }

        /* ==================== 主页 ==================== */
        .home-hero {
            text-align: center;
            padding: 40px 20px;
            background: linear-gradient(135deg, var(--secondary), var(--primary));
            border-radius: 20px;
            margin-bottom: 20px;
            border: 1px solid var(--border);
            position: relative;
            overflow: hidden;
        }

        .home-hero::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255, 215, 0, 0.1) 0%, transparent 50%);
            animation: rotate 20s linear infinite;
        }

        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .home-title {
            font-size: 2em;
            font-weight: bold;
            margin-bottom: 10px;
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            position: relative;
            z-index: 1;
        }

        .home-subtitle {
            color: var(--text-secondary);
            font-size: 0.9em;
            position: relative;
            z-index: 1;
        }

        .quick-actions {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin-bottom: 20px;
        }

        .action-card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 15px;
            padding: 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
        }

        .action-card:hover {
            transform: translateY(-5px);
            border-color: var(--accent);
            box-shadow: 0 10px 30px rgba(255, 215, 0, 0.2);
        }

        .action-icon {
            font-size: 2em;
            margin-bottom: 10px;
        }

        .action-title {
            font-size: 1em;
            font-weight: bold;
            margin-bottom: 5px;
        }

        .action-desc {
            font-size: 0.8em;
            color: var(--text-secondary);
        }

        /* ==================== 抽卡页面 ==================== */
        .gacha-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .gacha-title {
            font-size: 1.5em;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .gacha-pool {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 20px;
            text-align: center;
        }

        .gacha-pool-title {
            font-size: 1.2em;
            font-weight: bold;
            margin-bottom: 5px;
        }

        .gacha-pool-desc {
            font-size: 0.85em;
            color: var(--text-secondary);
            margin-bottom: 20px;
        }

        .gacha-preview {
            width: 150px;
            height: 200px;
            background: linear-gradient(135deg, var(--secondary), var(--primary));
            border: 2px solid var(--border);
            border-radius: 15px;
            margin: 0 auto 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3em;
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .gacha-buttons {
            display: flex;
            gap: 15px;
            justify-content: center;
        }

        .btn {
            padding: 12px 30px;
            border: none;
            border-radius: 25px;
            font-size: 1em;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--accent), #ffaa00);
            color: var(--primary);
        }

        .btn-secondary {
            background: var(--secondary);
            color: var(--text);
            border: 1px solid var(--border);
        }

        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(255, 215, 0, 0.3);
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .gacha-info {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 20px;
        }

        .gacha-info-title {
            font-size: 1em;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .gacha-rates {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .rate-item {
            display: flex;
            justify-content: space-between;
            font-size: 0.9em;
        }

        .rate-name {
            color: var(--text-secondary);
        }

        .rate-value {
            font-weight: bold;
        }

        .rate-ur { color: #ff6b9d; }
        .rate-ssr { color: #ffd700; }
        .rate-sr { color: #9b59b6; }
        .rate-r { color: #3498db; }
        .rate-n { color: #95a5a6; }

        /* ==================== 抽卡结果弹窗 ==================== */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .modal-overlay.active {
            display: flex;
        }

        .modal {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 30px;
            max-width: 400px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
        }

        .modal-title {
            text-align: center;
            font-size: 1.3em;
            font-weight: bold;
            margin-bottom: 20px;
        }

        .card-result {
            background: var(--secondary);
            border: 2px solid var(--border);
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 15px;
            animation: cardAppear 0.5s ease;
        }

        @keyframes cardAppear {
            from { opacity: 0; transform: scale(0.8) rotateY(180deg); }
            to { opacity: 1; transform: scale(1) rotateY(0); }
        }

        .card-rarity {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.8em;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .rarity-ur {
            background: linear-gradient(135deg, #ff6b9d, #ff8a65);
            color: white;
        }

        .rarity-ssr {
            background: linear-gradient(135deg, #ffd700, #ffaa00);
            color: var(--primary);
        }

        .rarity-sr {
            background: linear-gradient(135deg, #9b59b6, #8e44ad);
            color: white;
        }

        .rarity-r {
            background: linear-gradient(135deg, #3498db, #2980b9);
            color: white;
        }

        .rarity-n {
            background: linear-gradient(135deg, #95a5a6, #7f8c8d);
            color: white;
        }

        .card-name {
            font-size: 1.2em;
            font-weight: bold;
            margin-bottom: 8px;
        }

        .card-story {
            font-size: 0.85em;
            color: var(--text-secondary);
            line-height: 1.6;
        }

        .modal-close {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, var(--accent), #ffaa00);
            color: var(--primary);
            border: none;
            border-radius: 25px;
            font-size: 1em;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
        }

        /* ==================== 卡牌页面 ==================== */
        .cards-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .cards-title {
            font-size: 1.3em;
            font-weight: bold;
        }

        .cards-filter {
            display: flex;
            gap: 8px;
        }

        .filter-btn {
            padding: 6px 12px;
            border: 1px solid var(--border);
            border-radius: 20px;
            background: transparent;
            color: var(--text-secondary);
            font-size: 0.8em;
            cursor: pointer;
            transition: all 0.3s;
        }

        .filter-btn.active {
            background: var(--accent);
            color: var(--primary);
            border-color: var(--accent);
        }

        .cards-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
        }

        .card-item {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 15px;
            padding: 15px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .card-item:hover {
            transform: translateY(-5px);
            border-color: var(--accent);
        }

        .card-item-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .card-item-rarity {
            font-size: 0.7em;
            padding: 3px 8px;
            border-radius: 10px;
        }

        .card-item-name {
            font-size: 1em;
            font-weight: bold;
            margin-bottom: 5px;
        }

        .card-item-preview {
            font-size: 0.8em;
            color: var(--text-secondary);
            line-height: 1.4;
        }

        .cards-empty {
            text-align: center;
            padding: 40px 20px;
            color: var(--text-secondary);
        }

        .cards-empty-icon {
            font-size: 3em;
            margin-bottom: 15px;
        }

        /* ==================== 剧情页面 ==================== */
        .story-header {
            margin-bottom: 20px;
        }

        .story-title {
            font-size: 1.3em;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .story-chapters {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .chapter-card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 15px;
            padding: 20px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .chapter-card:hover {
            transform: translateX(5px);
            border-color: var(--accent);
        }

        .chapter-card.locked {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .chapter-card.locked:hover {
            transform: none;
            border-color: var(--border);
        }

        .chapter-number {
            font-size: 0.8em;
            color: var(--text-secondary);
            margin-bottom: 5px;
        }

        .chapter-name {
            font-size: 1.1em;
            font-weight: bold;
            margin-bottom: 8px;
        }

        .chapter-desc {
            font-size: 0.9em;
            color: var(--text-secondary);
            margin-bottom: 10px;
        }

        .chapter-status {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.8em;
        }

        .status-completed {
            background: rgba(46, 204, 113, 0.2);
            color: #2ecc71;
        }

        .status-unlocked {
            background: rgba(255, 215, 0, 0.2);
            color: var(--accent);
        }

        .status-locked {
            background: rgba(136, 136, 170, 0.2);
            color: var(--text-secondary);
        }

        /* ==================== 剧情播放器 ==================== */
        .story-player {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            z-index: 2000;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .story-player.active {
            display: flex;
        }

        .story-player-content {
            max-width: 500px;
            width: 100%;
            text-align: center;
        }

        .story-player-title {
            font-size: 1.2em;
            font-weight: bold;
            margin-bottom: 30px;
            color: var(--accent);
        }

        .story-text {
            font-size: 1.1em;
            line-height: 1.8;
            margin-bottom: 30px;
            animation: storyFadeIn 0.5s ease;
        }

        @keyframes storyFadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .story-choices {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-bottom: 30px;
        }

        .choice-btn {
            padding: 15px 30px;
            background: var(--secondary);
            border: 1px solid var(--border);
            border-radius: 25px;
            color: var(--text);
            font-size: 1em;
            cursor: pointer;
            transition: all 0.3s;
        }

        .choice-btn:hover {
            background: var(--accent);
            color: var(--primary);
            border-color: var(--accent);
        }

        .story-next-btn {
            padding: 12px 40px;
            background: linear-gradient(135deg, var(--accent), #ffaa00);
            color: var(--primary);
            border: none;
            border-radius: 25px;
            font-size: 1em;
            font-weight: bold;
            cursor: pointer;
        }

        /* ==================== 交易所页面 ==================== */
        .exchange-header {
            margin-bottom: 20px;
        }

        .exchange-title {
            font-size: 1.3em;
            font-weight: bold;
            margin-bottom: 15px;
        }

        .exchange-tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .exchange-tab {
            padding: 8px 20px;
            border: 1px solid var(--border);
            border-radius: 20px;
            background: transparent;
            color: var(--text-secondary);
            font-size: 0.9em;
            cursor: pointer;
            transition: all 0.3s;
        }

        .exchange-tab.active {
            background: var(--accent);
            color: var(--primary);
            border-color: var(--accent);
        }

        .exchange-list {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .exchange-item {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 15px;
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .exchange-item-name {
            font-size: 1em;
            font-weight: bold;
            margin-bottom: 5px;
        }

        .exchange-item-desc {
            font-size: 0.85em;
            color: var(--text-secondary);
        }

        .exchange-item-price {
            font-size: 1em;
            font-weight: bold;
            color: var(--accent);
        }

        .exchange-buy-btn {
            padding: 8px 20px;
            background: linear-gradient(135deg, var(--accent), #ffaa00);
            color: var(--primary);
            border: none;
            border-radius: 20px;
            font-size: 0.9em;
            font-weight: bold;
            cursor: pointer;
        }

        /* ==================== 成就页面 ==================== */
        .achievements-header {
            margin-bottom: 20px;
        }

        .achievements-title {
            font-size: 1.3em;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .achievements-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
        }

        .achievement-item {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 15px;
            padding: 20px;
            text-align: center;
            transition: all 0.3s;
        }

        .achievement-item.unlocked {
            border-color: var(--accent);
            background: rgba(255, 215, 0, 0.1);
        }

        .achievement-item.locked {
            opacity: 0.5;
        }

        .achievement-item-icon {
            font-size: 2em;
            margin-bottom: 10px;
        }

        .achievement-item-name {
            font-size: 1em;
            font-weight: bold;
            margin-bottom: 5px;
        }

        .achievement-item-desc {
            font-size: 0.8em;
            color: var(--text-secondary);
        }

        /* ==================== 成就弹窗 ==================== */
        .achievement-popup {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0.8);
            background: var(--card-bg);
            border: 2px solid var(--accent);
            border-radius: 20px;
            padding: 30px;
            text-align: center;
            z-index: 3000;
            opacity: 0;
            transition: all 0.3s ease;
        }

        .achievement-popup.show {
            opacity: 1;
            transform: translate(-50%, -50%) scale(1);
        }

        .achievement-icon {
            font-size: 3em;
            margin-bottom: 15px;
        }

        .achievement-title {
            font-size: 1.2em;
            font-weight: bold;
            margin-bottom: 10px;
            color: var(--accent);
        }

        .achievement-desc {
            font-size: 0.9em;
            color: var(--text-secondary);
            margin-bottom: 20px;
        }

        /* ==================== 通知系统 ==================== */
        .notification {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%) translateY(-100px);
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 15px;
            padding: 15px 30px;
            z-index: 4000;
            transition: transform 0.3s ease;
        }

        .notification.show {
            transform: translateX(-50%) translateY(0);
        }

        .notification.success {
            border-color: #2ecc71;
        }

        .notification.error {
            border-color: #e74c3c;
        }

        /* ==================== 统计信息 ==================== */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin-bottom: 20px;
        }

        .stat-item {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 15px;
            padding: 20px;
            text-align: center;
        }

        .stat-value {
            font-size: 1.5em;
            font-weight: bold;
            color: var(--accent);
            margin-bottom: 5px;
        }

        .stat-label {
            font-size: 0.8em;
            color: var(--text-secondary);
        }

        /* ==================== 每日奖励 ==================== */
        .daily-reward {
            background: linear-gradient(135deg, var(--secondary), var(--primary));
            border: 2px solid var(--accent);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
        }

        .daily-reward:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(255, 215, 0, 0.3);
        }

        .daily-reward.claimed {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .daily-reward-icon {
            font-size: 2em;
            margin-bottom: 10px;
        }

        .daily-reward-title {
            font-size: 1.1em;
            font-weight: bold;
            margin-bottom: 5px;
        }

        .daily-reward-desc {
            font-size: 0.9em;
            color: var(--text-secondary);
        }
    </style>
</head>
<body>
    <!-- 星空背景 -->
    <canvas id="stars-canvas"></canvas>

    <!-- 主容器 -->
    <div class="container">
        <!-- 顶部导航 -->
        <div class="header">

        // ==================== Canvas 星空背景 (性能优化) ====================
        function initStarsCanvas() {
            const canvas = document.getElementById('stars-canvas');
            const ctx = canvas.getContext('2d');
            let stars = [];
            let animationId;

            function resize() {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
            }

            function createStars() {
                stars = [];
                for (let i = 0; i < 100; i++) {
                    stars.push({
                        x: Math.random() * canvas.width,
                        y: Math.random() * canvas.height,
                        size: Math.random() * 2 + 0.5,
                        speed: Math.random() * 0.5 + 0.1,
                        opacity: Math.random(),
                        twinkleSpeed: Math.random() * 0.02 + 0.01
                    });
                }
            }

            function animate() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);

                stars.forEach(star => {
                    star.opacity += star.twinkleSpeed;
                    if (star.opacity > 1 || star.opacity < 0.3) {
                        star.twinkleSpeed *= -1;
                    }

                    ctx.beginPath();
                    ctx.arc(star.x, star.y, star.size, 0, Math.PI * 2);
                    ctx.fillStyle = `rgba(255, 255, 255, ${star.opacity})`;
                    ctx.fill();

                    star.y -= star.speed;
                    if (star.y < 0) {
                        star.y = canvas.height;
                        star.x = Math.random() * canvas.width;
                    }
                });

                animationId = requestAnimationFrame(animate);
            }

            resize();
            createStars();
            animate();

            window.addEventListener('resize', () => {
                resize();
                createStars();
            });
        }

        function claimDailyReward() {
            const now = new Date();
            const today = now.toDateString();
            const rewardEl = document.getElementById('daily-reward');

            if (gameState.lastDailyReward === today) {
                showNotification('今日已领取过奖励！', 'error');
                return;
            }

            // 检查连续签到
            const yesterday = new Date(now);
            yesterday.setDate(yesterday.getDate() - 1);
            if (gameState.lastDailyReward === yesterday.toDateString()) {
                gameState.dailyStreak++;
            } else {
                gameState.dailyStreak = 1;
            }

            // 计算奖励
            const baseReward = 200;
            const streakBonus = Math.min(gameState.dailyStreak * 50, 500);
            const totalReward = baseReward + streakBonus;

            gameState.coins += totalReward;
            gameState.lastDailyReward = today;

            saveGameState();
            updateUI();

            rewardEl.classList.add('claimed');
            rewardEl.querySelector('.daily-reward-desc').textContent = '今日已领取';

            showNotification(`签到成功！获得 ✦${totalReward}（连续${gameState.dailyStreak}天）`, 'success');
            checkAchievements();
        }

                gameState.pity = 0;
            } else if (rand < 20) {

                gameState.pity++;
            } else if (rand < 50) {
                rarity = 'r';
                gameState.pity++;
            } else {
                rarity = 'n';
                gameState.pity++;
            }

            const cardsOfRarity = CARDS_DATA.filter(card => card.rarity === rarity);
            const selectedCard = cardsOfRarity[Math.floor(Math.random() * cardsOfRarity.length)];

            return { ...selectedCard };
        }

                    </div>
                    <div class="card-item-name">${card.name}</div>
                    <div class="card-item-preview">${card.story.substring(0, 50)}...</div>
                </div>
            `).join('');
        }

        function filterCards(filter) {
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            event.currentTarget.classList.add('active');
            renderCards(filter);
        }

        function showCardDetail(cardId) {
            const card = gameState.cards.find(c => c.id === cardId);
            if (!card) return;

            const container = document.getElementById('card-detail');
            container.innerHTML = `
                <div style="text-align: center; margin-bottom: 20px;">
                    <span style="font-size: 4em">${card.emoji}</span>
                </div>
                <div style="text-align: center; margin-bottom: 15px;">
                    <span class="card-rarity rarity-${card.rarity}">${card.rarity.toUpperCase()}</span>
                </div>
                <div style="text-align: center; font-size: 1.3em; font-weight: bold; margin-bottom: 15px;">
                    ${card.name}
                </div>
                <div style="font-size: 0.95em; line-height: 1.8; color: var(--text-secondary);">
                    ${card.story}
                </div>
                <div style="margin-top: 20px; text-align: center; font-size: 0.8em; color: var(--text-secondary);">
                    获得时间：${new Date(card.obtainedAt).toLocaleDateString()}
                </div>
            `;

            document.getElementById('card-modal').classList.add('active');
        }

        function closeCardModal() {
            document.getElementById('card-modal').classList.remove('active');
        }

        // ==================== 剧情系统 ====================
        function renderChapters() {
            const container = document.getElementById('story-chapters');
            container.innerHTML = CHAPTERS_DATA.map(chapter => {
                const isUnlocked = gameState.unlockedChapters.includes(chapter.id);
                const isCompleted = gameState.completedChapters.includes(chapter.id);
                const canUnlock = gameState.cards.length >= chapter.requiredCards;

                let statusClass = 'status-locked';
                let statusText = '未解锁';
                let cardClass = '';

                if (isCompleted) {
                    statusClass = 'status-completed';
                    statusText = '已完成';
                } else if (isUnlocked) {
                    statusClass = 'status-unlocked';
                    statusText = '可探索';
                } else if (canUnlock) {
                    statusClass = 'status-unlocked';
                    statusText = '可解锁';
                    cardClass = '';
                } else {
                    cardClass = 'locked';
                }

                return `
                    <div class="chapter-card ${cardClass}" onclick="${isUnlocked || canUnlock ? `startChapter('${chapter.id}')` : ''}">
                        <div class="chapter-number">${chapter.id.replace('_', ' ').toUpperCase()}</div>
                        <div class="chapter-name">${chapter.name}</div>
                        <div class="chapter-desc">${chapter.desc}</div>
                        <div style="margin-bottom: 10px; font-size: 0.85em; color: var(--text-secondary);">
                            需要碎片：${chapter.requiredCards} | 已收集：${gameState.cards.length}
                        </div>
                        <span class="chapter-status ${statusClass}">${statusText}</span>
                    </div>
                `;
            }).join('');
        }

        function startChapter(chapterId) {
            const chapter = CHAPTERS_DATA.find(c => c.id === chapterId);
            if (!chapter) return;

            if (!gameState.unlockedChapters.includes(chapterId)) {
                gameState.unlockedChapters.push(chapterId);
                saveGameState();
            }

            gameState.currentStory = chapter;
            gameState.currentStoryPart = 0;

            document.getElementById('story-player-title').textContent = chapter.name;
            showStoryPart();
            document.getElementById('story-player').classList.add('active');
        }

        function showStoryPart() {
            const story = gameState.currentStory;
            const part = story.story[gameState.currentStoryPart];

            const content = document.getElementById('story-player-content');
            content.innerHTML = `
                <div class="story-text">${part.text}</div>
                ${part.choices ? `
                    <div class="story-choices">
                        ${part.choices.map((choice, index) => `
                            <button class="choice-btn" onclick="makeChoice(${index})">
                                ${choice.text}
                            </button>
                        `).join('')}
                    </div>
                ` : ''}
            `;

            const nextBtn = document.getElementById('story-next-btn');
            if (part.choices) {
                nextBtn.style.display = 'none';
            } else if (gameState.currentStoryPart >= story.story.length - 1) {
                nextBtn.style.display = 'none';
                setTimeout(() => {
                    if (!gameState.completedChapters.includes(story.id)) {
                        gameState.completedChapters.push(story.id);
                        saveGameState();
                        showNotification('章节完成！获得奖励 ✦ 200', 'success');
                        gameState.coins += 200;
                        updateUI();
                        checkAchievements();
                    }
                    closeStoryPlayer();
                }, 2000);
            } else {
                nextBtn.style.display = 'block';
                nextBtn.textContent = '继续';
            }
        }

        function nextStoryPart() {
            const story = gameState.currentStory;

            if (gameState.currentStoryPart >= story.story.length - 1) {
                if (!gameState.completedChapters.includes(story.id)) {
                    gameState.completedChapters.push(story.id);
                    saveGameState();
                    showNotification('章节完成！获得奖励 ✦ 200', 'success');
                    gameState.coins += 200;
                    updateUI();
                    checkAchievements();
                }
                closeStoryPlayer();
                return;
            }

            gameState.currentStoryPart++;
            showStoryPart();
        }

        function makeChoice(choiceIndex) {
            const story = gameState.currentStory;
            const part = story.story[gameState.currentStoryPart];
            const choice = part.choices[choiceIndex];

            if (choice.next !== undefined) {
                gameState.currentStoryPart = choice.next;
                showStoryPart();
            } else {
                nextStoryPart();
            }
        }

        function closeStoryPlayer() {
            document.getElementById('story-player').classList.remove('active');
            gameState.currentStory = null;
            gameState.currentStoryPart = 0;
            renderChapters();
        }

        // ==================== 交易所系统 ====================
        function switchExchangeTab(tab) {
            document.querySelectorAll('.exchange-tab').forEach(t => {
                t.classList.remove('active');
            });

            const tabButtons = document.querySelectorAll('.exchange-tab');
            const tabIndex = tab === 'shop' ? 0 : 1;
            if (tabButtons[tabIndex]) {
                tabButtons[tabIndex].classList.add('active');
            }

            renderExchange(tab);
        }

        function renderExchange(tab) {
            const container = document.getElementById('exchange-content');

            if (tab === 'shop') {
                container.innerHTML = `
                    <div class="exchange-list">
                        ${SHOP_ITEMS.map(item => `
                            <div class="exchange-item">
                                <div class="exchange-item-info">
                                    <div class="exchange-item-name">${item.emoji} ${item.name}</div>
                                    <div class="exchange-item-desc">${item.desc}</div>
                                </div>
                                <div style="display: flex; align-items: center; gap: 10px;">
                                    <div class="exchange-item-price">✦ ${item.price}</div>
                                    <button class="exchange-buy-btn" onclick="buyItem('${item.id}')">
                                        购买
                                    </button>
                                </div>
                            </div>
                        `).join('')}
                    </div>
                `;
            } else {
                container.innerHTML = `
                    <div style="text-align: center; padding: 40px 20px; color: var(--text-secondary);">
                        <div style="font-size: 3em; margin-bottom: 15px;">🔄</div>
                        <div>碎片交换功能即将开放</div>
                        <div style="font-size: 0.9em; margin-top: 10px;">
                            敬请期待与其他观测者交换记忆碎片！
                        </div>
                    </div>
                `;
            }
        }

        function buyItem(itemId) {
            const item = SHOP_ITEMS.find(i => i.id === itemId);
            if (!item) return;

            if (gameState.coins < item.price) {
                showNotification('星币不足！', 'error');
                return;
            }

            gameState.coins -= item.price;

            if (item.reward.type === 'timeSand') {
                gameState.timeSand += item.reward.amount;
            } else if (item.reward.type === 'coins') {
                gameState.coins += item.reward.amount;
            }

            saveGameState();
            updateUI();
            showNotification(`购买成功！获得 ${item.name}`, 'success');
            checkAchievements();
        }

        // ==================== 启动游戏 ====================
        init();
    </script>
</body>
</html>
